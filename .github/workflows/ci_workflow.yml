name: Python package

on:
  push:
    branches:
      - master

jobs:
  production-deploy:
    if: github.repository == 'denchec/playground'

    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: action/checkout@v3
      - name: Set up Python
        uses: actions/stetup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run:
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
      - name: Test functions
        run: pytest